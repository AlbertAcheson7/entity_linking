project_root: .
seed: 42
paths:
  source_dir: data/source_snomed_icd9cm_d_option_a
  prepared_dir: data/prepared_snomed_icd9cm_d_option_a
  base_chroma_dir: chroma/snomed_icd9cm_d_option_a/directional_pubmedbert/base
  finetuned_chroma_dir: chroma/snomed_icd9cm_d_option_a/directional/finetuned
  base_model_dir: models/base
  finetuned_model_dir: models/snomed_icd9cm_d_option_a/directional/best
  experiments_dir: experiments/snomed_icd9cm_d_option_a/directional
input_files:
  source_terms: snomed_ct.jsonl
  target_terms: icd9cm_d.jsonl
  maps: snomed_icd9cm_d.jsonl
models:
  embedding: NeuML/pubmedbert-base-embeddings
  embedding_adapter: directional_hf
  reranker: maidalun1020/bce-reranker-base_v1
  hf_endpoint: https://hf-mirror.com
  projection_dim: 256
  projection_file: directional_projection.pt
data:
  expected_source_terms: 6858
  expected_target_terms: 7017
  map_direction: SNOMEDCT_TO_ICD9CM_D
  split:
    train: 0.8
    validation: 0.1
    test: 0.1
  context_max_characters: 6000
index:
  batch_size: 128
  embedding_dimension: 256
  distance: cosine
  collections:
    source_name: snomed_ct_icd9cm_d_name_directional_pubmedbert
    source_context: snomed_ct_icd9cm_d_context_directional_pubmedbert
    target_name: icd9cm_d_name_directional_pubmedbert
    target_context: icd9cm_d_context_directional_pubmedbert
retrieval:
  backend: matrix
  fusion_strategy: best_view
  ranking_unit: view_record
  aggregation: none
  query_text_key: query_context_text
  target_view_keys:
  - context_text
  query_batch_size: 128
  per_view_top_k: 300
  fused_top_k: 300
  output_top_k: 10
  rrf_constant: 60
  reranker_batch_size: 64
training:
  epochs: 10
  batch_size: 16
  gradient_accumulation: 8
  learning_rate: 2.0e-05
  warmup_ratio: 0.1
  weight_decay: 0.01
  temperature: 0.05
  hard_negatives_per_query: 10
  query_max_length: 256
  target_max_length: 384
  mixed_precision: auto
  gradient_checkpointing: true
  num_workers: 2
