project_root: .
seed: 42

paths:
  source_dir: data/source
  prepared_dir: data/prepared
  base_chroma_dir: chroma/base
  finetuned_chroma_dir: chroma/finetuned
  base_model_dir: models/base
  finetuned_model_dir: models/finetuned/best
  experiments_dir: experiments

input_files:
  source_terms: who_icd10.jsonl
  target_terms: icd11_mms.jsonl
  maps: icd10_icd11.jsonl

models:
  embedding: maidalun1020/bce-embedding-base_v1
  embedding_adapter: bce # "bce", "sentence_transformers"
  reranker: maidalun1020/bce-reranker-base_v1
  hf_endpoint: https://hf-mirror.com

data:
  expected_source_terms: 10742
  expected_target_terms: 16076
  map_direction: ICD10_TO_ICD11_MMS
  split:
    train: 0.8
    validation: 0.1
    test: 0.1
  context_max_characters: 6000

index:
  batch_size: 128
  embedding_dimension: 768
  distance: cosine
  collections:
    source_name: who_icd10_name_bce
    source_context: who_icd10_context_bce
    target_name: icd11_mms_name_bce
    target_context: icd11_mms_context_bce

retrieval:
  backend: chroma # "chroma", "matrix"
  fusion_strategy: best_view # "rrf", "best_view"
  # Matrix backend settings. With ranking_unit=view_record, each target view
  # is ranked as a separate record; Hit@K succeeds if any returned record maps
  # to a positive target UID. Set aggregation=max or ranking_unit=entity to
  # collapse the best target view back to one score per target entity.
  ranking_unit: view_record # "view_record", "entity"
  aggregation: none # "none", "max"
  query_text_key: query_name_text # "query_name_text", "query_context_text", "query_path_text"
  target_view_keys:
    - name_text
    - context_text
    - path_text
  query_batch_size: 128
  per_view_top_k: 50
  fused_top_k: 50
  output_top_k: 10
  rrf_constant: 60
  reranker_batch_size: 64

training:
  epochs: 1
  batch_size: 16
  gradient_accumulation: 4
  learning_rate: 2.0e-5
  warmup_ratio: 0.05
  weight_decay: 0.01
  temperature: 0.05
  hard_negatives_per_query: 5
  query_max_length: 256
  target_max_length: 384
  mixed_precision: auto
  gradient_checkpointing: true
  num_workers: 2
